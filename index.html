<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoreLab. 접속</title>
    <meta property="og:title" content="StoreLab.">
    <meta property="og:description" content="발주 및 가게운영을 위한 백오피스">
    <meta property="og:image" content="https://knowyou50mat.github.io/OAuth/favicon.png">
    <link rel="icon" href="./favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --accent: #0071e3;
            --glass: rgba(255, 255, 255, 0.7);
            --text: #1d1d1f;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(0, 113, 227, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 45, 85, 0.05) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow: hidden;
        }

        #hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: 700;
            letter-spacing: -2px;
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 0;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px;
            width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            transform: translateY(30px);
            opacity: 0;
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .show-card {
            transform: translateY(0);
            opacity: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            color: #86868b;
            font-size: 15px;
        }

        /* Loading UI */
        .loader {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #loadingUI {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .glass-card {
                width: 90%;
                padding: 30px;
            }

            #hero-text {
                font-size: 50px;
            }
        }
    </style>
</head>

<body>
    <div id="hero-text">StoreLab.</div>

    <div class="glass-card" id="main-card">
        <svg style="width:50px; height:50px; margin-bottom:20px;" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4" />
            <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853" />
            <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                fill="#FBBC05" />
            <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335" />
        </svg>

        <div class="header">
            <h1>StoreLab 로그인</h1>
            <p>허가된 구글 계정으로 로그인해 주세요.</p>
        </div>

        <div id="g_id_onload" 
            data-client_id="527802223408-h6ac8ur5q09jkp81a8vgbsnlvcu66v6l.apps.googleusercontent.com"
            data-context="signin" 
            data-ux_mode="popup" 
            data-callback="handleCredentialResponse" 
            data-auto_prompt="true"
            data-auto_select="true"
            data-itp_support="true">
        </div>

        <div class="g_id_signin" 
            data-type="standard" 
            data-shape="rectangular" 
            data-theme="outline"
            data-text="signin_with" 
            data-size="large" 
            data-logo_alignment="center">
        </div>

        <div id="loadingUI">
            <div class="loader"></div>
            <p style="font-weight: 600; font-size: 15px;">인증 처리 중...</p>
            <p style="font-size: 12px; color: #86868b; margin-top:5px;">안전하게 시스템으로 이동합니다.</p>
            <!-- 리디렉셜 실패 보혁 버튼 -->
            <button id="fallbackBtn" onclick="doRedirect()"
                style="display:none; margin-top:16px; width:100%; background-color:#0071e3; color:white; border:none; border-radius:12px; padding:14px; font-size:14px; font-weight:600; cursor:pointer;">계속하기
                클릭</button>
        </div>

        <div
            style="margin-top: 30px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px; width: 100%; text-align: center;">
            <p style="font-size: 11px; color: #86868b;">보안을 위해 1시간 후 재로그인이 필요합니다.</p>
        </div>
    </div>

    <script>
        window.onload = () => {
            const hero = document.getElementById('hero-text');
            const card = document.getElementById('main-card');

            setTimeout(() => {
                hero.style.opacity = '1';
                setTimeout(() => {
                    hero.style.opacity = '0';
                    hero.style.transform = 'translate(-50%, -60%)';
                    setTimeout(() => {
                        card.classList.add('show-card');
                        // 자동 로그인 프롬프트 강제 실행
                        if (typeof google !== 'undefined') {
                            google.accounts.id.prompt((notification) => {
                                if (notification.isNotDisplayed()) {
                                    console.log('One Tap is not displayed:', notification.getNotDisplayedReason());
                                }
                            });
                        }
                    }, 500);
                }, 1200);
            }, 500);
        };

        const APPS_SCRIPT_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxWqQhFc2qJ43-KXybDI7MD2y-FDaXsNZerSowchAy-EkXHbuoIitAfYdzpY24Oknqmvw/exec";

        let _redirectUrl = '';

        function doRedirect() {
            if (_redirectUrl) window.location.href = _redirectUrl;
        }

        function handleCredentialResponse(response) {
            document.querySelector('.g_id_signin').style.display = 'none';

            const loading = document.getElementById('loadingUI');
            loading.style.display = 'block';

            const token = response.credential;
            const authUrl = window.location.href.split('?')[0];

            // [보안 강화] GET 리디렉션 대신 POST 폼 전송을 사용하여 토큰 노출 방지
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = APPS_SCRIPT_WEBAPP_URL;

            const tokenInput = document.createElement('input');
            tokenInput.type = 'hidden';
            tokenInput.name = 'token';
            tokenInput.value = token;
            form.appendChild(tokenInput);

            const authUrlInput = document.createElement('input');
            authUrlInput.type = 'hidden';
            authUrlInput.name = 'auth_url';
            authUrlInput.value = authUrl;
            form.appendChild(authUrlInput);

            document.body.appendChild(form);
            form.submit();

            // 5초 후에도 반응이 없으면 폴백 버튼 표시
            setTimeout(() => {
                const btn = document.getElementById('fallbackBtn');
                if (btn) btn.style.display = 'block';
            }, 5000);
        }
    </script>
</body>

</html>
